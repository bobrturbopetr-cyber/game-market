<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Game Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🎮 Game Market — Админ</h1>
        <nav>
            <a href="index.html">Магазин</a>
            <a href="games.html">Все игры</a>
            <a href="admin.html" class="active">Админ-панель</a>
        </nav>
    </header>

    <main>
        <h2>Управление играми</h2>
        <button id="add-game-btn" class="btn-primary">➕ Добавить игру</button>

        <div id="admin-games-list" class="admin-list"></div>

        <div id="game-form-container" style="display:none;">
            <h3>Добавить/Редактировать игру</h3>
            <form id="game-form">
                <input type="hidden" id="game-id">
                <label>Название: <input type="text" id="title" required></label>
                <label>Описание: <textarea id="description" required></textarea></label>
                <label>Цена (0 — бесплатно): <input type="number" id="price" value="0" step="0.01"></label>
                <label>Ссылка на игру (HTML/iframe): <input type="url" id="game-url" required></label>
                <label>URL иконки: <input type="url" id="icon-url" value="/default-icon.png"></label>
                <button type="submit">Сохранить</button>
                <button type="button" id="cancel-form">Отмена</button>
            </form>
        </div>
    </main>

    <script src="admin.js"></script>
</body>
</html>
